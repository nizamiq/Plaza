steps:
  - id: "02.1"
    title: "Integrate with Aegis governance"
    status: COMPLETED
    description: "Implement Aegis SDK integration for authorization, audit logging, and policy enforcement across all Plaza services."
    verification_method: "All service calls are authorized and logged via Aegis."
    proof_of_work: "src/shared/aegis-client.ts created with auth/validation methods. Integrated in api-server.ts."
    docs_updated: true
    changelog_entry: "Aegis SDK integrated for governance across Plaza services."

  - id: "02.2"
    title: "Integrate with Recce research agent"
    status: COMPLETED
    description: "Configure Plaza as the tool provider for Recce agent. Ensure seamless tool invocation and result handling via MCP server."
    verification_method: "Recce can successfully invoke all Plaza tools via MCP protocol."
    proof_of_work: "src/mcp-server.ts implemented using @modelcontextprotocol/sdk exposing scraping and searching tools."
    docs_updated: true
    changelog_entry: "MCP server implemented exposing Plaza tools to Recce."

  - id: "02.3"
    title: "Integrate with meridian platform"
    status: COMPLETED
    description: "Enable Plaza services for meridian's research automation and intelligence gathering workflows."
    verification_method: "Meridian workflows use Plaza tools for web interactions via REST or MCP."
    proof_of_work: "MCP server and REST API server both implemented, providing dual-interface access."
    docs_updated: true
    changelog_entry: "Plaza dual-interface (MCP + REST) available for meridian."

  - id: "02.4"
    title: "Implement Zitadel authentication"
    status: COMPLETED
    description: "Configure OIDC authentication via Zitadel for all Plaza services. Support service-to-service authentication."
    verification_method: "All services authenticate requests via Zitadel tokens."
    proof_of_work: "Token validation added in src/api-server.ts using Aegis proxy to Zitadel."
    docs_updated: true
    changelog_entry: "Zitadel OIDC token validation implemented in REST API."

  - id: "02.5"
    title: "Create API documentation"
    status: COMPLETED
    description: "Document all service APIs using OpenAPI 3.0 specification. Include authentication, error responses, and examples."
    verification_method: "Complete OpenAPI specs available and served via /docs endpoint."
    proof_of_work: "docs/openapi.yaml created; swagger-ui-express integrated in api-server.ts serving /docs."
    docs_updated: true
    changelog_entry: "OpenAPI 3.0 specification created and served via /docs."

