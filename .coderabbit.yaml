# https://github.com/coderabbitai/ai-pr-reviewer/blob/main/coderabbit.yaml

# The following settings are for the CodeRabbit AI PR reviewer. These settings
# are designed to be strict and to enforce the NizamIQ ecosystem standards.

# The language of the review comments. Can be one of: English, French, German,
# Indonesian, Italian, Japanese, Korean, Portuguese, Russian, Spanish, Simplified Chinese, Traditional Chinese, Turkish, Ukrainian
language: "English"

# When set to true, the AI will add a "LGTM" comment to the PR if no issues are found.
review_comment_lgtm: false

# When set to true, the AI will review files that are not part of the PR changeset.
# This is useful for providing context to the AI, but it can also be slow.
review_files_not_in_changeset: false

# When set to true, the AI will review simple changes, such as typo fixes.
review_simple_changes: false

# A list of glob patterns to exclude from the review. This is useful for
# excluding files that are not relevant to the review, such as documentation
# or generated files.
exclude:
  - "**/__tests__/**"
  - "**/*.spec.ts.ts"
  - "**spec.tsx"
  - "**/docs/**"
  - "**/.github/**"
  - "**/testdata/**"
  - "**/tests/**"
  - "**/*.md"

# A list of glob patterns to include in the review. This is useful for
# including files that are not part of the PR changeset, but are relevant to
# the review.
include: []

# The following settings are for the CodeRabbit AI PR summarizer. These settings
# are designed to be strict and to enforce the NizamIQ ecosystem standards.
summarize:
  # When set to true, the AI will summarize the PR. This is useful for providing
  # a quick overview of the changes in the PR.
  enabled: true

  # The type of summary to generate. Can be one of: "files", "pr"
  # "files" will generate a summary for each file in the PR.
  # "pr" will generate a single summary for the entire PR.
  summary_type: "pr"

  # When set to true, the AI will add a "PR summary" comment to the PR.
  # This is useful for providing a quick overview of the changes in the PR.
  # The summary will be added as a comment to the PR.
  add_summary_as_comment: false

