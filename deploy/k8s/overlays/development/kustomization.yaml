apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plaza-dev

resources:
  - ../../base

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: plaza-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug

commonLabels:
  environment: development
