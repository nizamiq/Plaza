apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plaza-prod

resources:
  - ../../base

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: plaza-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - RATE_LIMIT_REQUESTS_PER_MINUTE=1000
      - RATE_LIMIT_CONCURRENT=20

images:
  - name: ghcr.io/nizamiq/plaza
    newTag: "0.1.0"

commonLabels:
  environment: production
