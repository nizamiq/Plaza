# This is a placeholder for external-secrets integration
# Use with External Secrets Operator: https://external-secrets.io/

# Example ExternalSecret manifest:
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: plaza-secrets
  namespace: plaza
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: plaza-secrets
    creationPolicy: Owner
  data:
    - secretKey: EXA_API_KEY
      remoteRef:
        key: plaza/api-keys
        property: exa
    - secretKey: SERPER_API_KEY
      remoteRef:
        key: plaza/api-keys
        property: serper
    - secretKey: PERPLEXITY_API_KEY
      remoteRef:
        key: plaza/api-keys
        property: perplexity
    - secretKey: AEGIS_API_KEY
      remoteRef:
        key: plaza/api-keys
        property: aegis
