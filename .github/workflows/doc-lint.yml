name: UDS Documentation Lint

on:
  push:
    branches: [main, master]
    paths:
      - '**/*.md'
      - '.github/workflows/doc-lint.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.md'
      - '.github/workflows/doc-lint.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  workflow_call:

jobs:
  doc_lint:
    name: UDS Documentation Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed markdown files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="HEAD~1"
          fi
          git diff --name-only "$BASE" "$HEAD" -- '*.md' > /tmp/changed_md_files.txt 2>/dev/null || true
          echo "Changed markdown files:"
          cat /tmp/changed_md_files.txt || echo "(none)"

      - name: Check required files and directories
        run: |
          ERRORS=0
          check_file() {
            if [ ! -f "$1" ]; then
              echo "::error::Missing required file: $1"
              ERRORS=$((ERRORS + 1))
            fi
          }
          check_dir() {
            if [ ! -d "$1" ]; then
              echo "::warning::Missing recommended directory: $1"
            fi
          }
          check_file "CONTEXT.md"
          check_dir "docs/architecture"
          check_dir "docs/api"
          check_dir "docs/governance"
          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS required file(s) missing."
            exit 1
          fi
          echo "Required files check passed."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML jsonschema

      - name: Validate frontmatter of changed markdown files
        run: |
          python3 << 'PYEOF'
          import os, sys
          import yaml

          def has_frontmatter(path: str) -> bool:
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      first = f.readline().strip()
                      if first != '---':
                          return False
                      # Find closing ---
                      for line in f:
                          if line.strip() == '---':
                              return True
                      return False
              except Exception:
                  return False

          changed_file_list = '/tmp/changed_md_files.txt'
          if not os.path.exists(changed_file_list):
              print('No changed markdown list found; skipping.')
              sys.exit(0)

          with open(changed_file_list, 'r', encoding='utf-8') as f:
              files = [line.strip() for line in f.readlines() if line.strip()]

          # If none changed, validate all docs markdown files as a safety net.
          if not files:
              files = []
              for root, _, names in os.walk('docs'):
                  for n in names:
                      if n.endswith('.md'):
                          files.append(os.path.join(root, n))

          failures = []
          for p in files:
              if p.endswith('.md') and p.startswith('docs/'):
                  if not has_frontmatter(p):
                      failures.append(p)

          if failures:
              print('::error::Missing or invalid UDS frontmatter in:')
              for p in failures:
                  print(' -', p)
              sys.exit(1)

          print('UDS frontmatter check passed.')
          PYEOF
