name: UDS Documentation Lint

on:
  push:
    branches: [main, master]
    paths: ['**/*.md']
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  doc_lint:
    uses: nizamiq/documentation-standard/.github/workflows/doc-lint.yml@main
    secrets: inherit
    with:
      base_sha: ${{ github.event.pull_request.base.sha || '' }}
      head_sha: ${{ github.sha }}
