name: "Nizamiq Golden Pipeline"
# Authoritative standard: nizamiq-strategy/docs/governance/ci_cd_standards.md
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, ready_for_review]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nizamiq/plaza
jobs:
  lint:
    name: "Gate 1 — Code Quality"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - name: Run doc-lint
        run: |
          echo "Doc lint gate — placeholder for UDS lint"

  security-scan:
    name: "Gate 4 — Security Scan"
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ===================================================================
  # GATE 3: AI AUTONOMOUS REVIEW
  # ===================================================================
  coderabbit-review:
    name: "Gate 3a — AI Review (CodeRabbit)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write
    concurrency:
      group: ${{ github.repository }}-${{ github.event.pull_request.number }}-coderabbit
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false

  # ===================================================================
  # GATE 5: PIPELINE COMPLETION
  # ===================================================================
  pipeline-completion:
    name: "Gate 5 — Pipeline Completion"
    runs-on: ubuntu-latest
    needs: [coderabbit-review]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.coderabbit-review.result }}" != "success" ] && [ "${{ needs.coderabbit-review.result }}" != "skipped" ]; then
            echo "CodeRabbit review failed"
            exit 1
          fi
          echo "Pipeline completed successfully"

